; ESP32 station firmware — fake-phone client for the HW integration test rig.
; Joins an arbitrary WiFi AP, POSTs an arbitrary form, reports outcome over USB
; serial as JSON lines. Independent of orobot platform contracts.

[platformio]
default_envs = station

[env:station]
platform       = espressif32@6.7.0
board          = esp32dev
framework      = arduino
monitor_speed  = 115200
upload_speed   = 921600

platform_packages =
  framework-arduinoespressif32 @ ~3.20017.0

build_flags =
  -std=gnu++17
  -Wall -Wextra -Werror
  -DSTATION_FIRMWARE_VERSION=\"station-0.1.0\"

build_unflags =
  -std=gnu++11

lib_deps =
  bblanchon/ArduinoJson @ ^7.0.0
