; ESP32 orobot firmware — minimal scaffolding
;
; This env compiles a heartbeat-LED sketch so CI can prove the toolchain works
; end-to-end. Later PRs (#509 wifi, #510 ws, #511 protocol) add real behavior
; on top of this scaffold without re-plumbing PlatformIO config.
;
; Run `pio run -e esp32dev` to build, `pio run -e esp32dev -t upload` to flash.

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform       = espressif32@6.7.0
board          = esp32dev
framework      = arduino
monitor_speed  = 115200
upload_speed   = 921600

; Pin the core as tightly as the build will allow — ESP32 toolchain changes
; break things in non-obvious ways.
platform_packages =
  framework-arduinoespressif32 @ ~3.20017.0

; Warnings-as-errors keeps CI honest from day one.
; Gateway URL is compile-time. Override at build with:
;   OROBOT_GATEWAY_URL='ws://192.168.86.99:8080/device' pio run -e esp32dev
; Default is the production wss endpoint.
build_flags =
  -Wall
  -Wextra
  -Werror
  -DOROBOT_FIRMWARE_VERSION=\"esp32-scaffold-0.0.1\"
  '-DOROBOT_GATEWAY_URL="${sysenv.OROBOT_GATEWAY_URL}"'

lib_deps =
  bblanchon/ArduinoJson @ ^7.0.0
  links2004/WebSockets @ ^2.4.1

; Exclude downloaded library dependencies from static analysis — cppcheck in
; PlatformIO's toolchain can't parse ArduinoJson 7's advanced preprocessor macros.
check_tool = cppcheck
check_flags =
  --enable=warning,style
  --suppress=missingIncludeSystem
  --suppress=missingInclude
  --suppress=preprocessorErrorDirective
  -i .pio/libdeps
